# SPEC-COLLECTOR-DBGRANT-003 M2-T1 — AC-13 데이터 격리 결정성 검증
#
# 공유 MySQL Testcontainer(SharedMySqlContainer) 전환으로 클래스별 "항상 빈 DB" 암묵 보장이
# 사라졌다(REQ-DBGRANT3-015). 클래스 레벨 @Transactional 롤백 또는 root fixture 정리로 격리
# 전략을 전 파일에 분류·적용했지만(plan.md §1.4), 분류 누락이나 약한 격리가 남아있으면 특정
# 테스트 클래스 실행 순서에서만 잔여 행 충돌이 드러나는 순서 의존 결함이 될 수 있다.
#
# 최상위 테스트 클래스 실행 순서를 매 실행마다 무작위화하여 이 결함 유형을 상시 노출시킨다.
# JUnit ClassOrderer$Random은 시드를 지정하지 않으면 매 실행마다 새 시드를 생성하고 콘솔에
# WARNING으로 로그를 남긴다(재현 가능성 보장) — 실패 재현 시 아래 시드 파라미터로 고정한다.
#
# 재현 방법: ./gradlew test -Djunit.jupiter.testclass.order.random.seed=<로그에 남은 시드값>
# (Gradle test JVM에 전달하려면 build.gradle.kts의 systemProperties 또는
#  -Dtest.junit.jupiter.testclass.order.random.seed=... 형태로 오버라이드 가능 — 환경별 확인)
#
# AC-13 실측 절차(Run 단계, M2-T1 커밋 시점 실행 완료): 서로 다른 고정 시드 2종
# (seed=1, seed=42)로 전체 스위트를 반복 실행해 모두 green임을 확인했다.
junit.jupiter.testclass.order.default=org.junit.jupiter.api.ClassOrderer$Random
