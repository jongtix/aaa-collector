# db-integration н”„лЎңнҢҢмқј вҖ” Testcontainers MySQL м—°лҸҷ нҶөн•© н…ҢмҠӨнҠё м „лӢҙ
# DataSource URLмқҖ @ServiceConnectionмқҙ мһҗлҸҷ мЈјмһ…н•ҳлҜҖлЎң лі„лҸ„ м„Өм • л¶Ҳн•„мҡ”
spring:
  jpa:
    hibernate:
      ddl-auto: validate
  # Redis AutoConfiguration exclude вҖ” @MockitoBean(StringRedisTemplate)кіј м—ӯн• мқҙ лӢӨлҰ„
  # exclude м ңкұ° мӢң LettuceConnectionConfigurationмқҙ RedisProperties л°”мқёл”©мқ„ мӢңлҸ„н•ҳкі ,
  # application.ymlмқҳ port: ${REDIS_PORT}к°Җ лҜём„Өм •мқҙл©ҙ NumberFormatExceptionмңјлЎң м»Ён…ҚмҠӨнҠё лЎңл“ң мӢӨнҢЁ
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
