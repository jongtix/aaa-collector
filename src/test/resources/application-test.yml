# KIS 프로퍼티 — 테스트용 더미 값
kis:
  base-url: https://localhost
  user-id: testUser
  accounts:
    - alias: test
      account-number: "12345678"
      app-key: test-app-key
      app-secret: test-app-secret

# CatchUpRunner·WsRecovery 테스트 프로파일 비활성화 (CI @SpringBootTest 자동 실행 차단)
aaa:
  ws-recovery:
    enabled: false  # @SpringBootTest ApplicationReadyEvent 발화 시 실 WS 연결 방지 (REQ-WSREC-051)
  catchup:
    enabled: false

# 프로덕션은 환경변수 필수, 테스트는 아래 값으로 오버라이드
spring:
  flyway:
    # SPEC-COLLECTOR-DBGRANT-003 M1-T1: 프로덕션 계정 분리(ADR-026)를 재현하기 위해
    # datasource(@ServiceConnection 기본 계정) fallback을 제거하고, 제한된 flyway 계정
    # (UPDATE 권한 없음)으로 마이그레이션을 실행한다. 값은 com.aaa.collector.support.
    # SharedMySqlContainer의 FLYWAY_USERNAME/FLYWAY_PASSWORD 및
    # src/test/resources/testcontainers/01-init-accounts-mirror.sql과 반드시 일치해야 한다.
    user: flyway
    password: flyway-test-password
  data:
    redis:
      password: ""
