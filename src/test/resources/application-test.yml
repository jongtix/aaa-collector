# KIS 프로퍼티 — 테스트용 더미 값
kis:
  base-url: https://localhost
  user-id: testUser
  accounts:
    - alias: test
      account-number: "12345678"
      app-key: test-app-key
      app-secret: test-app-secret

# 프로덕션은 환경변수 필수, 테스트는 빈 값으로 오버라이드
spring:
  flyway:
    # 빈 값 → Flyway가 datasource 계정으로 fallback (Testcontainers @ServiceConnection 활용)
    user: ""
    password: ""
  data:
    redis:
      password: ""
