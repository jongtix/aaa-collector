server:
  shutdown: graceful

spring:
  application:
    name: aaa-collector
  threads:
    virtual:
      enabled: true
  jackson:
    time-zone: Asia/Seoul
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: collector
    password: ${MYSQL_COLLECTOR_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5        # 4서비스×5=최대 20커넥션 (단일 MySQL 제약, ADR-001 참조)
      minimum-idle: 2             # 배치 서비스 — 유휴 시 자원 절감
      connection-timeout: 5000    # 5s (기본값 30s) — Docker 내부 네트워크, 빠른 실패
      idle-timeout: 600000        # 10m (기본값)
      max-lifetime: 1800000       # 30m (기본값) — MySQL wait_timeout(8h)보다 충분히 짧음
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    user: flyway
    password: ${MYSQL_FLYWAY_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_APPUSER_USERNAME}
      password: ${REDIS_APPUSER_PASSWORD}
  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  pattern:
    # 로컬 개발 전용. %m CRLF 방어 미적용 — 소비자가 개발자 본인이며 프로덕션은 ECS JSON 사용. 외부 파이프 또는 다중 개발자 환경으로 전환 시 %replace(%m){'\r\n|\r|\n',' '} 적용 필요.
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%5p]){} %clr([%8.8X{trace_id}]){blue} %clr(${PID:-}){magenta} %clr(--- [%15.15t]){faint} %clr(%-40.40logger{39}){cyan}%clr(:%L){faint} %clr(:){faint} %m%n%wEx"
  file:
    name: ${LOG_PATH:/var/log/aaa-collector}/aaa-collector.log
  structured:
    format:
      file: ecs
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_PATH:/var/log/aaa-collector}/aaa-collector.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 1GB
      max-history: 30
      total-size-cap: 50GB
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    io.lettuce: WARN
    io.netty: WARN
    com.aaa.collector: INFO

kis:
  base-url: ${KIS_BASE_URL}
  user-id: ${KIS_USER_ID}
  accounts:
    - alias: isa
      account-number: ${KIS_ACCT_ISA_NUMBER}
      app-key: ${KIS_ACCT_ISA_APP_KEY}
      app-secret: ${KIS_ACCT_ISA_APP_SECRET}
    - alias: gold
      account-number: ${KIS_ACCT_GOLD_NUMBER}
      app-key: ${KIS_ACCT_GOLD_APP_KEY}
      app-secret: ${KIS_ACCT_GOLD_APP_SECRET}
    - alias: pension
      account-number: ${KIS_ACCT_PENSION_NUMBER}
      app-key: ${KIS_ACCT_PENSION_APP_KEY}
      app-secret: ${KIS_ACCT_PENSION_APP_SECRET}
    - alias: stock
      account-number: ${KIS_ACCT_STOCK_NUMBER}
      app-key: ${KIS_ACCT_STOCK_APP_KEY}
      app-secret: ${KIS_ACCT_STOCK_APP_SECRET}
    - alias: dc
      account-number: ${KIS_ACCT_DC_NUMBER}
      app-key: ${KIS_ACCT_DC_APP_KEY}
      app-secret: ${KIS_ACCT_DC_APP_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false
