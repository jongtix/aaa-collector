server:
  shutdown: graceful

spring:
  application:
    name: aaa-collector
  threads:
    virtual:
      enabled: true
  jackson:
    time-zone: Asia/Seoul
    property-naming-strategy: SNAKE_CASE
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: collector
    password: ${MYSQL_COLLECTOR_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10       # HikariCP 공식 (4코어×2)+1≈10 (prod Intel N100 4코어). 풀=세마포어, 추가 throttle 없음 (ADR-027)
      minimum-idle: 4             # 배치 cold start 워밍업 커넥션 확보 (max의 40%)
      connection-timeout: 20000   # 20s — 풀 슬롯 대기를 실패가 아닌 큐잉으로 흡수. 단 무한 아님(실제 DB 장애는 20s 내 가시화, ADR-027)
      idle-timeout: 600000        # 10m (기본값)
      max-lifetime: 1800000       # 30m (기본값) — MySQL wait_timeout(8h)보다 충분히 짧음
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    user: flyway
    password: ${MYSQL_FLYWAY_PASSWORD}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      username: ${REDIS_APPUSER_USERNAME}
      password: ${REDIS_APPUSER_PASSWORD}
  lifecycle:
    timeout-per-shutdown-phase: 30s

logging:
  pattern:
    # 로컬 개발 전용. %m CRLF 방어 미적용 — 소비자가 개발자 본인이며 프로덕션은 ECS JSON 사용. 외부 파이프 또는 다중 개발자 환경으로 전환 시 %replace(%m){'\r\n|\r|\n',' '} 적용 필요.
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr([%5p]){} %clr([%8.8X{trace_id}]){blue} %clr(${PID:-}){magenta} %clr(--- [%15.15t]){faint} %clr(%-40.40logger{39}){cyan}%clr(:%L){faint} %clr(:){faint} %m%n%wEx"
  file:
    name: ${LOG_PATH:/var/log/aaa-collector}/aaa-collector.log
  structured:
    format:
      file: ecs
  logback:
    rollingpolicy:
      file-name-pattern: ${LOG_PATH:/var/log/aaa-collector}/aaa-collector.%d{yyyy-MM-dd}.%i.log.gz
      max-file-size: 1GB
      max-history: 30
      total-size-cap: 50GB
  level:
    root: INFO
    org.springframework: WARN
    org.hibernate: WARN
    io.lettuce: WARN
    io.netty: WARN
    com.aaa.collector: INFO

kis:
  base-url: ${KIS_BASE_URL}
  user-id: ${KIS_USER_ID}
  rate-limit:
    # refillGreedy: 토큰을 연속·분산 충전하여 순간 버스트를 억제.
    # 1초 최대 처리량 = capacity + refill-per-second / 지속 처리량 = refill-per-second.
    # KIS REST 한도는 앱키별(per-key) ~20 TPS (프로브 실측 + 문서, 2026-06-10).
    # 이전 cap2/refill8(10 TPS)은 EGW00201을 전부 "한도초과"로 오판해 과도하게 낮춘 값이었다.
    # 실제 EGW00201엔 비-소진성(간헐) 성분이 있어 어떤 설정에서도 일부 발생하며,
    # 재시도(limiter 재경유)로 흡수한다 — 0을 목표로 과보수하지 말 것.
    # 한도 ~20 대비 ~10% 마진으로 상향(peak 18). 상향 후 EGW00201 발생률 관측해 재튜닝(git이 튜닝 채널).
    # 219종목 처리 시 약 15초 소요 (일 2회 배치 → 허용 범위).
    capacity: 3            # 버스트 헤드룸 최소화 (GC/지터 대응)
    refill-per-second: 15  # 지속 15 TPS, peak 18 (한도 ~20 대비 마진)
    max-concurrency: 10    # 동시 in-flight HTTP 요청 상한 (SPEC-COLLECTOR-WLSYNC-005)
  accounts:
    - alias: isa
      account-number: ${KIS_ACCT_ISA_NUMBER}
      app-key: ${KIS_ACCT_ISA_APP_KEY}
      app-secret: ${KIS_ACCT_ISA_APP_SECRET}
    - alias: gold
      account-number: ${KIS_ACCT_GOLD_NUMBER}
      app-key: ${KIS_ACCT_GOLD_APP_KEY}
      app-secret: ${KIS_ACCT_GOLD_APP_SECRET}
    - alias: pension
      account-number: ${KIS_ACCT_PENSION_NUMBER}
      app-key: ${KIS_ACCT_PENSION_APP_KEY}
      app-secret: ${KIS_ACCT_PENSION_APP_SECRET}
    - alias: stock
      account-number: ${KIS_ACCT_STOCK_NUMBER}
      app-key: ${KIS_ACCT_STOCK_APP_KEY}
      app-secret: ${KIS_ACCT_STOCK_APP_SECRET}
    - alias: dc
      account-number: ${KIS_ACCT_DC_NUMBER}
      app-key: ${KIS_ACCT_DC_APP_KEY}
      app-secret: ${KIS_ACCT_DC_APP_SECRET}

aaa:
  market-indicator:
    usdkrw:
      # 빈 배열 재시도 상한 (REQ-012)
      empty-retry-max: 5
    backfill:
      # cron 표현식 (기본: 02:00 KST 매일). fixedDelay 금지 — Virtual Threads 버그(ADR-008, REQ-046)
      cron: "0 0 2 * * *"
      usdkrw:
        # KOREAEXIM 백필 연속 평일 빈 결과 종료 임계 (REQ-044)
        stale-weekday-threshold: 7
    koreaexim-api-key: ${KOREAEXIM_API_KEY:}
    fred-api-key: ${FRED_API_KEY:}
  backfill:
    # cron 표현식 (기본: 02:00 KST 매일). fixedDelay 금지 — Virtual Threads 버그(CLAUDE.md)
    cron: "0 0 2 * * *"
    # 한 cron 회차에서 inner 완성 루프를 개시할 최대 status 슬롯 수 (REQ-BACKFILL-054, AC-3.1)
    per-run-completion-cap: 10
    # status당 inner 루프 최대 윈도우 반복 횟수 — 공통 하드 캡 (REQ-BACKFILL-053a)
    # SPAN 150일 × 120 ≈ 49년 커버
    max-windows-per-target: 120
    # 그룹 B 연속 무전진 종료 임계 (REQ-BACKFILL-014)
    stale-window-threshold: 3
    # 그룹 A SPAN 폭(달력일). 100거래일 충족을 위해 ≥150 (REQ-BACKFILL-013a)
    span-calendar-days: 150
    # 그룹 B rt_cd=2 anchor 보정 최대 시도 횟수 (REQ-BACKFILL-016)
    anchor-skip-max: 10
  macro:
    backfill:
      # cron 표현식 (기본: 03:00 KST 매일). fixedDelay 금지 — Virtual Threads 버그(CLAUDE.md)
      cron: "0 0 3 * * *"
  ecos:
    base-url: https://ecos.bok.or.kr
    service-key: ${ECOS_API_KEY:}
    connect-timeout: 5s
    read-timeout: 30s
  fred:
    base-url: https://api.stlouisfed.org
    api-key: ${FRED_API_KEY:}
    connect-timeout: 5s
    read-timeout: 30s
  extended-hours:
    # 종목 간 yahoo API 요청 딜레이 (ms). yahoo 비공식 API rate limit 회피 (REQ-EXTH-011)
    request-delay-ms: 2500
    # PRE-final cron — PRE 세션 마감(09:30 ET) +30분. fixedDelay 금지 (ADR-008)
    pre-cron: "0 0 10 * * MON-FRI"
    # AFTER-final cron — POST 세션 마감(20:00 ET) +30분. fixedDelay 금지 (ADR-008)
    after-cron: "0 30 20 * * MON-FRI"

management:
  endpoints:
    web:
      exposure:
        # REQ-OBSV-001/002: health + prometheus(VM 호환)만 노출, 그 외 actuator 엔드포인트 미노출
        include: health,prometheus
  endpoint:
    health:
      show-details: never
  health:
    redis:
      enabled: false
