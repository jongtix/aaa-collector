name: Release

on:
  push:
    branches:
      - main

permissions: {}  # 워크플로 전체 기본 권한 차단, job별 최소 권한 선언

jobs:
  # TODO: JDK + Gradle 설정이 3회 이상 반복될 경우 Reusable Workflow 추출 검토
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup JDK 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Run checks
        # includes jacoco 85% line coverage gate transitively via check dependsOn jacocoTestCoverageVerification
        run: ./gradlew check

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Run semantic-release
        run: >
          npx
          -p semantic-release@25.0.3
          -p @semantic-release/commit-analyzer@13.0.1
          -p @semantic-release/release-notes-generator@14.1.0
          -p @semantic-release/git@10.0.1
          -p @semantic-release/github@12.0.6
          -p @semantic-release/exec@7.1.0
          -p conventional-changelog-conventionalcommits@9.3.0
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
