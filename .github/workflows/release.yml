name: Release

on:
  push:
    branches:
      - main

permissions: {}  # 워크플로 전체 기본 권한 차단, job별 최소 권한 선언

jobs:
  # TODO: JDK + Gradle 설정이 3회 이상 반복될 경우 Reusable Workflow 추출 검토
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Run checks
        run: ./gradlew check

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22

      - name: Run semantic-release
        run: >
          npx
          -p semantic-release@25.0.3
          -p @semantic-release/commit-analyzer@13.0.1
          -p @semantic-release/release-notes-generator@14.1.0
          -p @semantic-release/git@10.0.1
          -p @semantic-release/github@12.0.6
          -p @semantic-release/exec@7.1.0
          -p conventional-changelog-conventionalcommits@9.3.0
          semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
